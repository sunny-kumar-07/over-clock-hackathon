# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: 
  Claude (Anthropic) was used briefly for initial brainstorming of rule ideas 
  and dataset inspection. The core byte-offset multiprocessing architecture, 
  HashingVectorizer implementation, and aggressive performance optimizations 
  (orjson, GC tuning) were hand-tuned by the team to achieve the sub-20 second runtime. 
  No candidate data was sent to any external LLM API at ranking time.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: 
  Hybrid rule + local-semantic ranking engine, fully CPU/offline. The JD is
  encoded once into config.py (must-have skill families matched at the
  concept level, explicit hard disqualifiers from the JD's stated dealbreakers,
  startup experience bonuses, weights). scoring.py computes, per candidate : (1) a honeypot/consistency
  check; (2) hard disqualifier penalties; (3) must-have skill coverage blended with tested assessments; 
  (4) highly-optimized HashingVectorizer cosine similarity vs a JD-derived ideal-candidate reference;
  (5) Profile quality bonuses (tier-1 edu, certs, startup exp);
  (6) a behavioral multiplier (response rate, recency, social proof). 
  The engine uses byte-offset multiprocessing with orjson for fast JSON parsing,
  bypassing the Python GIL and eliminating IPC serialization overhead,
  allowing perfect scaling across all CPU cores.
  Runtime is under 20 seconds for 100K candidates, CPU-only. 0 honeypots in final top-100.

