# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Claude (Anthropic) was used to write the majority of the pipeline code
  (config.py, scoring.py, rank.py, app.py) and to help design the scoring
  logic, including rules grounded in patterns found while inspecting the
  real dataset (e.g. honeypot detection). The team reviewed, tested, and
  tuned the resulting code and weights. No candidate data was sent to any
  external LLM API at ranking time.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Hybrid rule + local-semantic ranking engine, fully CPU/offline. The JD is
  encoded once into config.py (must-have skill families matched at the
  concept level, explicit hard disqualifiers from the JD's stated dealbreakers,
  weights). scoring.py computes, per candidate: (1) a honeypot/consistency
  check (expert skill claimed with near-zero duration, career-history months
  exceeding stated years of experience, proficiency vs tested assessment gap);
  (2) hard disqualifier penalties (consulting-only career, pure-research-only,
  no recent hands-on code, CV/speech-only without NLP/IR, title-chasing,
  closed-source-only validated via github_activity_score); (3) must-have
  skill coverage blended with tested skill_assessment_scores; (4) batched
  TF-IDF+SVD cosine similarity vs a JD-derived ideal-candidate reference;
  (5) a 6-signal behavioral multiplier (response rate, recency, open-to-work,
  interview completion, offer acceptance, social proof). Runtime ~165 seconds
  for 100K candidates, CPU-only, 0/100 honeypots in final top-100.

